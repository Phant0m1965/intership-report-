<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    input { padding: 10px; margin: 5px; width: 80%; max-width: 300px; }
    button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    #otpBox { display: none; margin-top: 20px; }
    #msg { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

<h2>🔐 Secure PDF Access System</h2>

<input type="password" id="password" placeholder="Enter Password">
<br>
<button onclick="checkPassword()">Submit</button>

<br><br>

<div id="otpBox">
  <input type="text" id="otp" placeholder="Enter OTP">
  <br>
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<br>
<button onclick="testEmail()">📩 Test Email</button>
<p id="msg"></p>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<!-- pdf-lib for PDF decryption -->
<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
emailjs.init("ewF-SAioIdVR_29GE");

// CONFIG
const correctPassword = "Admin#01!01!11$00%";
const serviceID = "service_dw4656z";
const templateID = "template_58vy1k2";
const receiverEmail = "paramhingu1@gmail.com";

// PDF password settings
const directPDFPassword = "Direct123@123";  // password if user opens PDF directly
const otpPDFPassword = "OTP123";        // password provided via OTP

// STATE
let generatedOTP = "";
let otpTime = 0;
let attempts = 0;
let lockUntil = 0;

// ================= PASSWORD CHECK =================
function checkPassword() {
  let now = Date.now();
  if (now < lockUntil) {
    let remaining = Math.ceil((lockUntil - now) / 1000);
    document.getElementById("msg").innerText = "🚫 Locked. Try again after " + remaining + " seconds";
    return;
  }
  let pass = document.getElementById("password").value;
  if (pass === correctPassword) {
    attempts = 0;
    generatedOTP = Math.floor(100000 + Math.random() * 900000);
    otpTime = Date.now();
    // Send OTP via EmailJS
    emailjs.send(serviceID, templateID, {
      to_email: receiverEmail,
      content: `Your OTP is ${generatedOTP}\nPDF password: ${otpPDFPassword}`
    })
    .then(() => {
      document.getElementById("msg").innerText = "✅ OTP sent to email";
      document.getElementById("otpBox").style.display = "block";
    })
    .catch((err) => {
      console.log("EMAIL ERROR:", err);
      document.getElementById("msg").innerText = "❌ Email failed (check setup)";
    });
  } else {
    attempts++;
    if (attempts >= 3) {
      lockUntil = Date.now() + (1 * 60 * 1000);
      attempts = 0;
      document.getElementById("msg").innerText = "🚫 Locked for 1 minute";
    } else {
      document.getElementById("msg").innerText = "❌ Wrong password (" + attempts + "/3)";
    }
  }
}

// ================= OTP VERIFY =================
async function verifyOTP() {
  let input = document.getElementById("otp").value;
  if (!input) {
    document.getElementById("msg").innerText = "⚠️ Enter OTP first";
    return;
  }
  if (Date.now() - otpTime > 60000) {
    document.getElementById("msg").innerText = "⏳ OTP expired";
    return;
  }
  if (input == generatedOTP) {
    document.getElementById("msg").innerText = "✅ Access granted";

    // Fetch PDF as Blob
    const res = await fetch("MyINTERNSHIP_REPORT.pdf");
    const blob = await res.blob();
    const arrayBuffer = await blob.arrayBuffer();

    // Decrypt PDF using OTP password
    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { password: otpPDFPassword });
    const pdfBytes = await pdfDoc.save();
    const url = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
    window.open(url, "_blank");
  } else {
    document.getElementById("msg").innerText = "❌ Wrong OTP";
  }
}

// ================= TEST EMAIL =================
function testEmail() {
  emailjs.send(serviceID, templateID, {
    to_email: receiverEmail,
    content: "TEST OTP 123456"
  })
  .then(() => {
    document.getElementById("msg").innerText = "✅ Test email sent";
  })
  .catch((err) => {
    console.log("ERROR:", err);
    document.getElementById("msg").innerText = "❌ Email failed";
  });
}
</script>

</body>
</html>
