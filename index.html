<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF System</title>
</head>
<body>

<h2>PDF Access System</h2>

<input type="password" id="password" placeholder="Enter Password">
<button onclick="checkPassword()">Submit</button>

<br><br>

<div id="otpBox" style="display:none;">
  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="msg"></p>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

let generatedOTP = "";

function checkPassword() {
  let pass = document.getElementById("password").value;

  if(pass === "Admin#01!01#11$00%") {

    generatedOTP = Math.floor(100000 + Math.random() * 900000);

    emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
      to_email: "YOUR_EMAIL@gmail.com",
      message: "Your OTP is: " + generatedOTP
    });

    document.getElementById("msg").innerText = "OTP sent to email!";
    document.getElementById("otpBox").style.display = "block";

  } else {
    document.getElementById("msg").innerText = "Wrong password!";
  }
}

function verifyOTP() {
  let input = document.getElementById("otp").value;

  if(input == generatedOTP) {
    document.getElementById("msg").innerText = "Access granted!";
    window.open("file.pdf");
  } else {
    document.getElementById("msg").innerText = "Wrong OTP!";
  }
}
</script>

</body>
</html>
