<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF System</title>
</head>
<body>

<h2>PDF Access System</h2>

<!-- Password step -->
<div id="step1">
  <h3>Enter PDF Password</h3>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="checkPassword()">Submit</button>
</div>

<!-- OTP step -->
<div id="step2" style="display:none;">
  <h3>OTP Sent to Email</h3>
  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<p id="msg"></p>

<script>
function checkPassword() {
  let pass = document.getElementById("password").value;

  if(pass === "Admin#01!01#11$00%") {
    document.getElementById("msg").innerText = "Password correct. Sending OTP...";
    document.getElementById("step2").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "Wrong password!";
  }
}

function verifyOTP() {
  document.getElementById("msg").innerText = "OTP verified (demo). Opening PDF...";
  window.open("file.pdf");
}
</script>

</body>
</html>
