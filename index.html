<!DOCTYPE html>
<html>
<head>
  <title>Secure PDF System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
      max-width: 300px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
    }

    #otpBox {
      display: none;
      margin-top: 20px;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🔐 Secure PDF Access System</h2>

<input type="password" id="password" placeholder="Enter Password">
<br>
<button onclick="checkPassword()">Submit</button>

<br><br>

<div id="otpBox">
  <input type="text" id="otp" placeholder="Enter OTP">
  <br>
  <button onclick="verifyOTP()">Verify OTP</button>
</div>

<br>
<button onclick="testEmail()">📩 Test Email</button>

<p id="msg"></p>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("ewF-SAioIdVR_29GE");

// CONFIG
const correctPassword = "Admin#01!01!11$00%";
const serviceID = "service_7zxd95s";
const templateID = "template_58vy1k2";

// 🔥 FIXED EMAIL (ADMIN EMAIL)
const receiverEmail = "paramhingu1@gmail.com";

// STATE
let generatedOTP = "";
let otpTime = 0;
let attempts = 0;
let lockUntil = 0;

// ================= PASSWORD CHECK =================
function checkPassword() {

  let now = Date.now();

  // LOCK CHECK
  if (now < lockUntil) {
    let remaining = Math.ceil((lockUntil - now) / 1000);
    document.getElementById("msg").innerText =
      "🚫 Locked. Try again after " + remaining + " seconds";
    return;
  }

  let pass = document.getElementById("password").value;

  if (pass === correctPassword) {

    attempts = 0;

    // OTP GENERATE
    generatedOTP = Math.floor(100000 + Math.random() * 900000);
    otpTime = Date.now();

    // 🔥 EMAIL SEND (FIXED PROPER WAY)
    emailjs.send(serviceID, templateID, {
      to_email: receiverEmail,
      content: String(generatedOTP)
    })
    .then(() => {
      document.getElementById("msg").innerText = "✅ OTP sent to email";
      document.getElementById("otpBox").style.display = "block";
    })
    .catch((err) => {
      console.log("EMAIL ERROR:", err);
      document.getElementById("msg").innerText = "❌ Email failed (check setup)";
    });

  } else {

    attempts++;

    if (attempts >= 3) {
      lockUntil = Date.now() + (1 * 60 * 1000);
      attempts = 0;
      document.getElementById("msg").innerText =
        "🚫 Locked for 1 minute";
    } else {
      document.getElementById("msg").innerText =
        "❌ Wrong password (" + attempts + "/3)";
    }
  }
}

// ================= OTP VERIFY =================
function verifyOTP() {

  let input = document.getElementById("otp").value;

  if (!input) {
    document.getElementById("msg").innerText = "⚠️ Enter OTP first";
    return;
  }

  // expiry check (1 min)
  if (Date.now() - otpTime > 60000) {
    document.getElementById("msg").innerText = "⏳ OTP expired";
    return;
  }

  if (input == generatedOTP) {
    document.getElementById("msg").innerText = "✅ Access granted";

    fetch("file.pdf")
      .then(res => res.blob())
      .then(blob => {
        let url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      });

  } else {
    document.getElementById("msg").innerText = "❌ Wrong OTP";
  }
}

// ================= TEST EMAIL =================
function testEmail() {

  emailjs.send(serviceID, templateID, {
    to_email: receiverEmail,
    message: "TEST OTP 123456"
  })
  .then(() => {
    document.getElementById("msg").innerText = "✅ Test email sent";
  })
  .catch((err) => {
    console.log("ERROR:", err);
    document.getElementById("msg").innerText = "❌ Email failed";
  });
}
</script>

</body>
</html>
